services:
  neo4j:
    image: neo4j:5-community
    container_name: graph-rag-neo4j
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol
    environment:
      - NEO4J_AUTH=neo4j/graphrag2024
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped
 
volumes:
  neo4j_data:
  neo4j_logs: